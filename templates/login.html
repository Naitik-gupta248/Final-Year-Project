<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #fff;
    }

    .login-container {
      background: rgba(0, 0, 0, 0.7);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      width: 350px;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 32px;
      color: #ffd700;
      text-shadow: 1px 1px 5px #000;
    }

    input[type="email"], input[type="password"] {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    input[type="email"]:focus, input[type="password"]:focus {
      outline: none;
      box-shadow: 0 0 10px #ffd700;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #ffd700;
      color: #000;
      transition: 0.3s;
    }

    button:hover {
      background: #ffc107;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 20px;
      border: 2px solid #fff;
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background: #fff;
      color: #2575fc;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form action="/login" method="post">
      <input type="email" name="email" placeholder="Email" required><br>
      <input type="password" name="password" placeholder="Password" required><br>
      <button type="submit">Login</button>
    </form>
    <a href="/register">Register</a>
  </div>
</body>
</html>
