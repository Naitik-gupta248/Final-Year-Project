<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .dashboard {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      text-align: center;
      width: 350px;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #ffd700;
      text-shadow: 1px 1px 5px #000;
    }

    input[type="file"] {
      display: block;
      margin: 20px auto;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #2575fc;
      color: #fff;
      font-weight: bold;
      transition: 0.3s;
    }

    input[type="file"]:hover {
      background: #6a11cb;
    }

    button {
      background: #ffd700;
      color: #000;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ffc107;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      padding: 10px 20px;
      border: 2px solid #fff;
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background: #fff;
      color: #2575fc;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h2>Welcome {{ user }}</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="resume" accept=".pdf" required>
      <button type="submit">Upload Resume</button>
    </form>
    <a href="/logout">Logout</a>
  </div>
</body>
</html>
